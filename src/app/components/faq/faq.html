<section class="py-32 md:py-40 relative">
  <div class="max-w-3xl mx-auto px-6">
    <h2 class="text-4xl md:text-5xl lg:text-6xl font-heading font-bold text-center mb-4">
      Frequently Asked <span class="text-gradient">Questions</span>
    </h2>
    <p class="text-white/60 text-center text-lg mb-16 max-w-2xl mx-auto">
      Everything you need to know about working with Aishware Tech
    </p>

    <div class="space-y-4">
      @for (faq of faqs; track $index) {
        <div class="faq-item glass rounded-2xl overflow-hidden transition-colors duration-300 hover:border-white/10">
          <button
            (click)="toggle($index)"
            class="w-full flex items-center justify-between px-6 md:px-8 py-5 text-left cursor-pointer"
          >
            <span class="text-base md:text-lg font-medium text-white/90 pr-4">{{ faq.question }}</span>
            <span
              class="flex-shrink-0 w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-accent-1 transition-transform duration-300"
              [class.rotate-45]="openIndex() === $index"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </span>
          </button>
          <div class="faq-answer overflow-hidden" style="height: 0; opacity: 0">
            <div class="px-6 md:px-8 pb-5">
              <p class="text-white/60 leading-relaxed">{{ faq.answer }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
