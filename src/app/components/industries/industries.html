<section class="py-32 md:py-40 relative">
  <div class="max-w-7xl mx-auto px-6">
    <h2 class="text-4xl md:text-5xl lg:text-6xl font-heading font-bold text-center mb-4">
      Industries We <span class="text-gradient">Serve</span>
    </h2>
    <p class="text-white/60 text-center text-lg mb-16 max-w-2xl mx-auto">
      Delivering tailored technology solutions across diverse sectors
    </p>

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (industry of industries; track industry.name) {
        <div class="industry-card glass rounded-2xl p-6 md:p-8 glass-hover transition-all duration-300 hover:scale-[1.02] group" style="opacity:0;transform:translateY(40px)">
          <div class="w-14 h-14 rounded-xl bg-white/5 flex items-center justify-center text-2xl mb-6 group-hover:scale-110 transition-transform duration-300">
            {{ getIcon(industry.icon) }}
          </div>
          <h3 class="text-xl font-semibold font-heading mb-3 text-white/90">{{ industry.name }}</h3>
          <p class="text-white/60 leading-relaxed">{{ industry.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
