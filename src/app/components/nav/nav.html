<nav
  #navContainer
  [class.glass]="isScrolled()"
  [class.bg-primary]="!isScrolled()"
  class="fixed top-0 left-0 right-0 z-40 h-20 flex items-center px-6 md:px-12 transition-all duration-300"
>
  <div class="max-w-7xl w-full mx-auto flex items-center justify-between">
    <button
      class="text-2xl font-bold text-gradient tracking-tight cursor-pointer"
      (click)="scrollTo('hero')"
    >
      Aishware Tech
    </button>

    <div #navLinks class="hidden md:flex items-center gap-8">
      <a
        *ngFor="let link of links"
        class="text-sm font-medium cursor-pointer transition-colors duration-200"
        [class.text-accent-1]="activeSection() === link.target"
        [class.text-gray-400]="activeSection() !== link.target"
        (click)="scrollTo(link.target)"
      >
        {{ link.label }}
      </a>
    </div>

    <button
      class="hidden md:inline-flex px-6 py-2.5 rounded-full bg-accent-gradient text-sm font-semibold text-white cursor-pointer transition-all duration-300 hover:shadow-lg hover:shadow-blue-500/25"
      (click)="scrollTo('contact')"
    >
      Let's Talk
    </button>

    <button
      class="md:hidden flex flex-col gap-1.5 p-2 cursor-pointer"
      (click)="toggleMobile()"
      aria-label="Toggle menu"
    >
      <span
        class="block w-6 h-0.5 rounded bg-white transition-all duration-300"
        [class.rotate-45]="isMobileOpen()"
        [class.translate-y-2]="isMobileOpen()"
      ></span>
      <span
        class="block w-6 h-0.5 rounded bg-white transition-all duration-300"
        [class.opacity-0]="isMobileOpen()"
      ></span>
      <span
        class="block w-6 h-0.5 rounded bg-white transition-all duration-300"
        [class.-rotate-45]="isMobileOpen()"
        [class.-translate-y-2]="isMobileOpen()"
      ></span>
    </button>
  </div>

  <div
    #mobileMenu
    class="fixed top-20 left-0 right-0 bg-primary/95 backdrop-blur-xl border-t border-white/5 md:hidden transition-all duration-300 overflow-y-auto"
    [class.max-h-[calc(100dvh-5rem)]="isMobileOpen()"
    [class.max-h-0]="!isMobileOpen()"
  >
    <div class="flex flex-col p-6 gap-4">
      <a
        *ngFor="let link of links"
        class="text-sm font-medium py-2 transition-colors duration-200"
        [class.text-accent-1]="activeSection() === link.target"
        [class.text-gray-400]="activeSection() !== link.target"
        (click)="scrollTo(link.target)"
      >
        {{ link.label }}
      </a>
      <button
        class="mt-2 px-6 py-3 rounded-full bg-accent-gradient text-sm font-semibold text-white text-center cursor-pointer"
        (click)="scrollTo('contact')"
      >
        Let's Talk
      </button>
    </div>
  </div>
</nav>
