<section class="relative overflow-hidden py-32 md:py-40">
  <div class="container mx-auto px-6">
    <h2 class="text-4xl md:text-5xl font-bold text-center mb-4 font-heading">Meet Our Team</h2>
    <p class="text-lg text-center text-gray-400 mb-16 max-w-2xl mx-auto">
      Talented professionals dedicated to engineering excellence
    </p>

    <div class="team-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6 max-w-7xl mx-auto">
      @for (member of members; track member.name) {
        <div class="team-card group relative glass glass-hover rounded-xl p-6 text-center transition-all duration-300 hover:-translate-y-1">
          <div class="w-20 h-20 rounded-full flex items-center justify-center text-white font-bold text-xl mx-auto mb-4"
               [style.background]="member.gradient">
            {{ member.initials }}
          </div>

          <h3 class="text-lg font-semibold mb-1">{{ member.name }}</h3>
          <p class="text-sm text-accent-1 font-medium mb-3">{{ member.role }}</p>
          <p class="text-sm text-gray-400 leading-relaxed">{{ member.bio }}</p>

          <div class="team-socials flex justify-center gap-3 mt-4 opacity-100 md:opacity-0 translate-y-0 md:translate-y-4 transition-all duration-300 md:group-hover:opacity-100 md:group-hover:translate-y-0">
            @for (social of member.socials; track social.icon) {
              <a [href]="social.url"
                 target="_blank"
                 rel="noopener noreferrer"
                 class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white/70 hover:bg-accent-1 hover:text-white transition-all duration-300">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                  <path [attr.d]="socialIcon(social.icon)"/>
                </svg>
              </a>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
