<section class="py-40 relative overflow-hidden">
  <div class="absolute inset-0 animated-gradient" style="background: linear-gradient(135deg, #0F172A 0%, #1e1b4b 25%, #0c4a6e 50%, #1e1b4b 75%, #0F172A 100%)"></div>
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_rgba(59,130,246,0.1)_0%,_transparent_70%)]"></div>

  <div class="max-w-4xl mx-auto px-6 text-center relative z-10">
    <h2 class="text-4xl sm:text-5xl md:text-7xl lg:text-8xl font-heading font-bold leading-[1.1] mb-8">
      Let's Build Something<br/>
      <span class="text-gradient">Extraordinary</span> Together
    </h2>
    <p class="text-lg md:text-xl text-white/60 max-w-2xl mx-auto mb-12">
      Ready to transform your idea into reality? Let's collaborate and build something that makes a difference.
    </p>
    <button
      magnetic
      class="inline-flex items-center gap-2 px-10 py-5 rounded-xl bg-accent-gradient text-white font-semibold text-lg cursor-pointer transition-all duration-300 hover:shadow-xl hover:shadow-accent-1/20 active:scale-[0.97]"
      (click)="scrollTo('contact')"
    >
      Schedule Consultation
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>
</section>
