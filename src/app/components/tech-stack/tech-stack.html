<section class="relative overflow-hidden py-32 md:py-40">
  <div class="container mx-auto px-6">
    <h2 class="text-4xl md:text-5xl font-bold text-center mb-8 font-heading">Technology Stack</h2>
    <p class="text-lg text-center text-gray-400 mb-16 max-w-2xl mx-auto">
      Modern technologies powering next-generation solutions
    </p>

    <div class="orbit-scene relative w-72 h-72 sm:w-80 sm:h-80 md:w-96 md:h-96 mx-auto">
      <div class="absolute inset-0 flex items-center justify-center z-10">
        <div class="text-center">
          <p class="text-sm md:text-base font-semibold text-white/80">Aishware Tech</p>
          <p class="text-xs md:text-sm text-white/50">Solutions</p>
        </div>
      </div>

      <div class="absolute inset-0" style="animation: orbit-spin 30s linear infinite">
        @for (tech of technologies; track tech.name; let i = $index, n = $count) {
          <div class="absolute top-1/2 left-1/2"
               [style.transform]="'translate(-50%, -50%) rotate(' + (i * 360 / n) + 'deg) translateY(-' + orbitRadius + 'px)'">
            <span class="inline-block px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-white/10 text-white/90 backdrop-blur-sm border border-white/10"
                  [style.--offset]="(-i * 360 / n) + 'deg'"
                  style="animation: orbit-counter-spin 30s linear infinite">
              {{ tech.name }}
            </span>
          </div>
        }
      </div>
    </div>
  </div>
</section>

<style>
  @keyframes orbit-spin {
    to { transform: rotate(360deg); }
  }
  @keyframes orbit-counter-spin {
    from { transform: rotate(360deg + var(--offset, 0deg)); }
    to { transform: rotate(0deg + var(--offset, 0deg)); }
  }
</style>
