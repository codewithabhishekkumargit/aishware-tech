<section class="py-32 md:py-40 relative">
  <div class="max-w-7xl mx-auto px-6">
    <h2 class="text-4xl md:text-5xl lg:text-6xl font-heading font-bold text-center mb-4">
      Our Impact in <span class="text-gradient">Numbers</span>
    </h2>
    <p class="text-white/60 text-center text-lg mb-16 max-w-2xl mx-auto">
      Measurable results that speak for themselves
    </p>

    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
      @for (metric of metrics; track metric.label) {
        <div class="metric-card glass rounded-2xl p-8 text-center">
          <span
            class="metric-value block text-5xl md:text-6xl font-metrics font-bold text-gradient mb-2"
            [attr.data-target]="metric.value"
            [attr.data-suffix]="metric.suffix || ''"
          >0{{ metric.suffix || '' }}</span>
          <span class="text-white/60 text-sm uppercase tracking-wider">{{ metric.label }}</span>
        </div>
      }
    </div>

    <div class="chart-placeholder glass rounded-2xl p-8 md:p-10">
      <div class="flex items-end justify-between gap-3 h-64">
        <div class="flex-1 bg-gradient-to-t from-accent-1/40 to-accent-1/10 rounded-t-lg transition-all duration-500 hover:from-accent-1/60" style="height: 45%"></div>
        <div class="flex-1 bg-gradient-to-t from-accent-2/40 to-accent-2/10 rounded-t-lg transition-all duration-500 hover:from-accent-2/60" style="height: 75%"></div>
        <div class="flex-1 bg-gradient-to-t from-accent-3/40 to-accent-3/10 rounded-t-lg transition-all duration-500 hover:from-accent-3/60" style="height: 55%"></div>
        <div class="flex-1 bg-gradient-to-t from-accent-1/40 to-accent-1/10 rounded-t-lg transition-all duration-500 hover:from-accent-1/60" style="height: 85%"></div>
        <div class="flex-1 bg-gradient-to-t from-accent-2/40 to-accent-2/10 rounded-t-lg transition-all duration-500 hover:from-accent-2/60" style="height: 65%"></div>
        <div class="flex-1 bg-gradient-to-t from-accent-3/40 to-accent-3/10 rounded-t-lg transition-all duration-500 hover:from-accent-3/60" style="height: 90%"></div>
        <div class="flex-1 bg-gradient-to-t from-accent-1/40 to-accent-1/10 rounded-t-lg transition-all duration-500 hover:from-accent-1/60" style="height: 40%"></div>
        <div class="flex-1 bg-gradient-to-t from-accent-2/40 to-accent-2/10 rounded-t-lg transition-all duration-500 hover:from-accent-2/60" style="height: 70%"></div>
        <div class="flex-1 bg-gradient-to-t from-accent-3/40 to-accent-3/10 rounded-t-lg transition-all duration-500 hover:from-accent-3/60" style="height: 50%"></div>
        <div class="flex-1 bg-gradient-to-t from-accent-1/40 to-accent-1/10 rounded-t-lg transition-all duration-500 hover:from-accent-1/60" style="height: 80%"></div>
      </div>
      <div class="flex justify-between mt-4">
        @for (label of ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct']; track $index) {
          <span class="text-white/30 text-xs">{{ label }}</span>
        }
      </div>
    </div>
  </div>
</section>
