<div
  class="hidden md:block fixed top-0 left-0 pointer-events-none z-50"
  [class.invisible]="!isVisible()"
>
  <div
    #dot
    class="absolute w-2 h-2 rounded-full bg-accent-1 -translate-x-1/2 -translate-y-1/2"
  ></div>
  <div
    #ring
    class="absolute w-8 h-8 rounded-full border border-white/30 -translate-x-1/2 -translate-y-1/2"
  ></div>
</div>
